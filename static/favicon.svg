<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Chip body border -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Inner chip core fill -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#3b82f6" opacity="0.2"/>
  <!-- Lightning bolt arrow (solid cyan so it's clearly visible) -->
  <path d="M17.5 12.5L14 17h3.5L14.5 21.5L20 16h-3.5L17.5 12.5Z" fill="#22d3ee"/>
  <!-- Chip pins top -->
  <line x1="13" y1="9" x2="13" y2="6.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="9" x2="19" y2="6.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins bottom -->
  <line x1="13" y1="23" x2="13" y2="25.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="19" y2="25.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins left -->
  <line x1="9" y1="13" x2="6.5" y2="13" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="19" x2="6.5" y2="19" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="23" y1="13" x2="25.5" y2="13" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="19" x2="25.5" y2="19" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
</svg>
