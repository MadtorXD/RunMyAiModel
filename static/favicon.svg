<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="none" stroke="url(#grad)" stroke-width="1.5"/>
  <!-- Inner chip core -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="url(#grad)" opacity="0.2"/>
  <!-- Lightning bolt / run arrow in the center -->
  <path d="M17.5 12.5L14 17h3.5L14.5 21.5L20 16h-3.5L17.5 12.5Z" fill="url(#grad)"/>
  <!-- Chip pins top -->
  <line x1="13" y1="9" x2="13" y2="6.5" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="9" x2="19" y2="6.5" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins bottom -->
  <line x1="13" y1="23" x2="13" y2="25.5" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="19" y2="25.5" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins left -->
  <line x1="9" y1="13" x2="6.5" y2="13" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="19" x2="6.5" y2="19" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="23" y1="13" x2="25.5" y2="13" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="19" x2="25.5" y2="19" stroke="url(#grad)" stroke-width="1.2" stroke-linecap="round"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
</svg>
